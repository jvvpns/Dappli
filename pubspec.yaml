name: kusinai01_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.3.0

  # ✅ Camera & Image utils
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.5.4
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  numberpicker: ^2.1.2

  # ✅ TensorFlow Lite
  tflite_flutter: ^0.12.1

  # ✅ Gemini AI
  google_generative_ai: ^0.4.0

  # ✅ SVG Support
  flutter_svg: ^2.0.10+1

  # ✅ HTTP Client
  http: ^1.2.2

  # Optional: Philippines utilities
  philippines_rpcmb: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ✅ Logo
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/login_img.png
    - assets/placeholder.jpg
    - assets/google_icon.png
    - assets/facebook_icon.png
    - assets/default_avatar.png
    - assets/models/filipino_ingredients.tflite
    - assets/labels/labels.txt
    - assets/logo.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 26

flutter_native_splash:
  color: "#ffffff"               # background color (beige)
  image: assets/logo.png
  android_12:
    image: assets/logo.png
    color: "#ffffff"
